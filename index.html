<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Трекер">
<title>Трекер привычек</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F5F0;
    --surface: #FFFFFF;
    --surface2: #F2EDE6;
    --surface3: #EDE8E0;
    --accent: #5C7A5E;
    --accent-soft: rgba(92,122,94,0.10);
    --choco: #3D2B1F;
    --choco2: #6B4C3B;
    --choco3: #A07860;
    --text: #2C2418;
    --text2: #7A6A5A;
    --text3: #B0A090;
    --border: rgba(61,43,31,0.08);
    --border2: rgba(61,43,31,0.15);
    --done-bg: #5C7A5E;
    --done-text: #fff;
    --skip-bg: #EDE8E0;
    --skip-text: #B0A090;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;
    --warn: #B85A1A;
    --warn-bg: #FDF0E6;
    --shadow-sm: 0 2px 8px rgba(61,43,31,0.08);
    --shadow-md: 0 4px 16px rgba(61,43,31,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; padding-bottom: 60px; }

  /* FIX iOS zoom */
  input, select, textarea { font-size: 16px !important; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 20px 24px 0;
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 16px;
  }
  .app-header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px; font-weight: 600;
    color: var(--choco); letter-spacing: -0.01em;
  }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; border-radius: var(--radius-sm);
    padding: 8px 16px; font-size: 12px; font-weight: 600;
    font-family: 'Montserrat', sans-serif; letter-spacing: 0.01em;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn:active { transform: scale(0.97); box-shadow: none; }
  .btn-export { background: var(--choco2); color: white; }
  .btn-import { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); box-shadow: none; }
  .btn-quick { background: var(--accent); color: white; }

  /* TABS */
  .tabs { display: flex; gap: 0; margin-top: 4px; }
  .tab-btn {
    flex: 1; padding: 12px 16px; border: none; background: none;
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 0.02em; text-transform: uppercase;
    color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  /* WEEK NAV */
  .week-bar {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 10px;
  }
  .nav-arrow {
    background: var(--surface2); border: none; border-radius: var(--radius-xs);
    width: 36px; height: 36px; cursor: pointer; font-size: 16px; color: var(--choco2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .nav-arrow:hover { background: var(--surface3); transform: translateY(-1px); }
  .week-label {
    font-size: 13px; font-weight: 500; color: var(--text2);
    flex: 1; text-align: center; font-family: 'Inter', sans-serif;
  }
  .btn-today {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); padding: 8px 16px;
    font-size: 12px; font-weight: 600; font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .btn-today:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* TABLE */
  .table-scroll { overflow-x: auto; padding: 20px 20px 0; }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 2px;
    min-width: 520px;
  }

  /* Sticky header */
  thead th {
    background: var(--bg);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 600;
    color: var(--choco3);
    padding: 8px 10px 10px; text-align: center;
    letter-spacing: 0.04em; text-transform: uppercase;
    position: sticky; top: 0; z-index: 3;
    border-bottom: 2px solid var(--border2);
  }
  thead th.param-col {
    text-align: left; min-width: 160px; padding-left: 16px;
    position: sticky; top: 0; left: 0; z-index: 4; background: var(--bg);
  }

  /* Rows - air instead of borders */
  tbody tr { transition: all 0.12s; }
  tbody tr:nth-child(even) td { background: var(--surface2); }
  tbody tr:nth-child(odd) td { background: var(--surface); }
  tbody tr td {
    padding: 10px 10px;
    border: none;
    vertical-align: middle;
    transition: background 0.1s;
  }
  tbody tr td:first-child { border-radius: var(--radius-xs) 0 0 var(--radius-xs); }
  tbody tr td:last-child { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; }
  tbody tr:hover td { background: var(--surface3) !important; }

  td.param-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--choco); padding-left: 16px; min-width: 160px;
    position: sticky; left: 0; z-index: 1;
    box-shadow: 3px 0 8px rgba(61,43,31,0.06);
  }
  td.day-cell { text-align: center; min-width: 64px; }
  td.today-cell { background: var(--accent-soft) !important; }

  /* CHECK BUTTON — rounded square with soft shadow */
  .check-btn {
    width: 34px; height: 34px;
    border-radius: var(--radius-xs);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    cursor: pointer; font-size: 13px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.18s; color: var(--text3);
    box-shadow: var(--shadow-sm);
  }
  .check-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .check-btn.done {
    background: var(--done-bg); border-color: var(--done-bg);
    color: var(--done-text);
    box-shadow: 0 3px 10px rgba(92,122,94,0.35);
  }
  .check-btn.skip {
    background: var(--skip-bg); border-color: transparent;
    color: var(--skip-text); box-shadow: none;
  }

  /* NUM INPUT — beige pill */
  .num-input {
    width: 54px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 6px 4px; text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px !important;
    font-weight: 600;
    background: var(--surface2);
    color: var(--choco);
    transition: all 0.15s;
    box-shadow: inset 0 1px 3px rgba(61,43,31,0.05);
  }
  .num-input:focus {
    outline: none; border-color: var(--accent);
    background: white; box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* NOTES */
  .notes-input {
    width: 100%; border: 1.5px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 6px 10px; font-family: 'Inter', sans-serif; font-size: 12px;
    background: var(--surface2); color: var(--choco); min-width: 130px;
    min-height: 64px; resize: vertical; transition: all 0.15s;
  }
  .notes-input:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* SECTION DIVIDERS */
  .section-divider td:first-child { position: sticky; left: 0; z-index: 1; }
  .section-divider td {
    background: var(--bg) !important;
    padding: 16px 16px 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; color: var(--choco3);
    text-transform: uppercase; letter-spacing: 0.10em;
    font-weight: 700; border: none;
  }

  /* PROGRESS VIEW */
  .progress-view { padding: 20px 20px; }
  .progress-view h2 {
    font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700;
    color: var(--choco); margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .progress-week-label { font-size: 12px; color: var(--text3); margin-bottom: 16px; font-weight: 500; }

  .period-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .period-btn {
    padding: 9px 22px; border: 1.5px solid var(--border2); border-radius: 24px;
    background: none; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--text2); cursor: pointer; transition: all 0.18s;
  }
  .period-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(92,122,94,0.3); }
  .period-btn:hover:not(.active) { background: var(--surface2); }

  /* Chart card */
  .chart-card {
    background: var(--surface); border-radius: 20px;
    padding: 20px; margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(61,43,31,0.07);
    border: 1px solid var(--border);
  }
  .chart-card-title {
    font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--choco3); text-transform: uppercase; letter-spacing: 0.10em; margin-bottom: 16px;
  }
  .chart-metric-label {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
    color: var(--choco2); margin-bottom: 6px; letter-spacing: 0.01em;
  }

  /* Progress section title */
  .section-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700; color: var(--choco3);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 12px; margin-top: 4px;
  }

  /* Nutrient cards */
  .progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .p-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 18px 18px;
    box-shadow: 0 4px 15px rgba(61,43,31,0.05);
  }
  .p-card.warn { border-color: rgba(184,90,26,0.25); background: var(--warn-bg); }
  .p-card.full { grid-column: 1 / -1; }
  .p-title {
    font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--choco3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 6px;
  }
  .p-nums { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .p-big { font-size: 26px; font-weight: 700; font-family: 'Montserrat', sans-serif; color: var(--choco); }
  .p-unit { font-size: 11px; color: var(--text3); font-weight: 400; }
  .p-sub { font-size: 11px; color: var(--text3); margin-bottom: 10px; line-height: 1.4; }
  .p-bar { background: var(--surface2); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 5px; }
  .p-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease-in-out; background: var(--accent); }
  .p-fill.warn { background: var(--warn); }
  .p-fill.blue { background: #7A9FC9; }
  .p-fill.purple { background: #9A8FC9; }
  .p-pct { font-size: 11px; color: var(--text3); font-weight: 500; }
  .warn-text { font-size: 11px; color: var(--warn); margin-top: 8px; line-height: 1.4; }

  /* Habits grid - 2 columns, big cards */
  .habits-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .habit-chip {
    background: var(--surface); border-radius: 20px;
    padding: 18px 16px; text-align: center;
    box-shadow: 0 4px 15px rgba(61,43,31,0.05);
    border: 1px solid var(--border);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .habit-chip:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(61,43,31,0.09); }
  .habit-chip-icon { font-size: 24px; margin-bottom: 8px; }
  .habit-chip-label {
    font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
    color: var(--choco3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .habit-chip-val { font-size: 22px; font-weight: 700; font-family: 'Montserrat', sans-serif; color: var(--choco); }
  .habit-chip-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* QUICK INPUT MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(61,43,31,0.45);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    width: 100%; max-width: 420px; padding: 28px 24px;
    box-shadow: 0 24px 64px rgba(61,43,31,0.22);
  }
  .modal-step { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; color: var(--choco3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .modal-label { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 600; color: var(--choco); margin-bottom: 20px; line-height: 1.2; letter-spacing: -0.01em; }

  .modal-check-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .modal-check-btn {
    flex: 1; padding: 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2);
    background: var(--surface2); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; color: var(--text2);
    box-shadow: var(--shadow-sm);
  }
  .modal-check-btn.selected-yes { background: var(--done-bg); border-color: var(--done-bg); color: white; box-shadow: 0 4px 12px rgba(92,122,94,0.35); }
  .modal-check-btn.selected-skip { background: var(--surface3); border-color: transparent; color: var(--text3); box-shadow: none; }
  .modal-check-btn:hover:not(.selected-yes):not(.selected-skip) { border-color: var(--accent); color: var(--accent); }

  .modal-num-wrap { margin-bottom: 24px; }
  .modal-num-input {
    width: 100%; border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 12px 16px; font-size: 18px; font-family: 'DM Sans', sans-serif;
    background: transparent; color: var(--text); text-align: center;
    transition: border-color 0.15s;
  }
  .modal-num-input:focus { outline: none; border-color: var(--accent); }

  .modal-text-wrap { margin-bottom: 24px; }
  .modal-text-input {
    width: 100%; border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 12px 16px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    background: transparent; color: var(--text); min-height: 80px; resize: none;
    transition: border-color 0.15s;
  }
  .modal-text-input:focus { outline: none; border-color: var(--accent); }

  .modal-awareness {
    background: rgba(92,122,94,0.08); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 24px;
  }
  .modal-awareness-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
  .modal-awareness-q { font-size: 14px; color: var(--text); line-height: 1.5; font-style: italic; }
  .modal-awareness-input {
    width: 100%; border: none; border-top: 1px solid var(--border); margin-top: 10px;
    padding: 8px 0 0; font-size: 14px; font-family: 'DM Sans', sans-serif;
    background: transparent; color: var(--text); resize: none; min-height: 50px;
  }
  .modal-awareness-input:focus { outline: none; }

  .modal-progress { background: var(--surface2); border-radius: 4px; height: 4px; margin-bottom: 20px; overflow: hidden; }
  .modal-progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s ease; }

  .modal-btns { display: flex; gap: 10px; }
  .modal-btn-back {
    padding: 12px 20px; border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .modal-btn-next {
    flex: 1; padding: 12px 20px; border: none; border-radius: var(--radius-sm);
    background: var(--accent); color: white; font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 12px rgba(92,122,94,0.3);
  }
  .modal-btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(92,122,94,0.4); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--choco); color: white; padding: 12px 24px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    font-family: 'Montserrat', sans-serif; letter-spacing: 0.02em;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(61,43,31,0.25);
  }
  .toast.show { opacity: 1; }
  #importFile { display: none; }

  @media (max-width: 700px) {
    .progress-grid { grid-template-columns: 1fr; }
    .p-card.full { grid-column: 1; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .app-header, .week-bar, .progress-view { padding-left: 16px; padding-right: 16px; }
    .table-scroll { padding-left: 16px; padding-right: 16px; }
    .habits-grid { grid-template-columns: repeat(2, 1fr); }
    .header-actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <h1>Трекер привычек</h1>
    <div class="header-actions">
      <button class="btn btn-quick" onclick="openQuick()">&#9654; Быстрый ввод</button>
      <button class="btn btn-export" onclick="exportData()">&#8595; Экспорт</button>
      <button class="btn btn-import" onclick="document.getElementById('importFile').click()">&#8593; Импорт</button>
      <input type="file" id="importFile" accept=".json" onchange="importData(event)">
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tracker', this)">Трекер</button>
    <button class="tab-btn" onclick="switchTab('progress', this)">Прогресс</button>
  </div>
</div>

<div class="week-bar">
  <button class="nav-arrow" onclick="shiftWeek(-1)">&#8592;</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="nav-arrow" onclick="shiftWeek(1)">&#8594;</button>
  <button class="btn-today" onclick="goToday()">Сегодня</button>
</div>

<!-- TRACKER VIEW -->
<div id="view-tracker" class="view active">
  <div class="table-scroll"><table id="trackerTable"></table></div>
</div>

<!-- PROGRESS VIEW -->
<div id="view-progress" class="view">
  <div class="progress-view">
    <h2>Прогресс</h2>
    <div class="period-tabs">
      <button class="period-btn active" onclick="switchPeriod('week', this)">Неделя</button>
      <button class="period-btn" onclick="switchPeriod('month', this)">Месяц</button>
    </div>
    <div class="progress-week-label" id="progressPeriodLabel"></div>
    <div class="chart-card">
      <div class="chart-card-title">Динамика состояния</div>
      <div id="moodChart"></div>
    </div>
    <div class="section-title">Нутриенты</div>
    <div class="progress-grid" id="nutrientCards"></div>
    <div class="section-title" style="margin-top:4px">Привычки</div>
    <div class="habits-grid" id="habitsGrid"></div>
  </div>
</div>

<!-- QUICK INPUT MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-progress"><div class="modal-progress-fill" id="modalProgressFill"></div></div>
    <div class="modal-step" id="modalStep"></div>
    <div class="modal-label" id="modalLabel"></div>
    <div id="modalInput"></div>
    <div class="hidden" id="modalAwareness"></div>
    <div class="modal-btns">
      <button class="modal-btn-back" onclick="quickBack()">&#8592;</button>
      <button class="modal-btn-next" id="modalNextBtn" onclick="quickNext()">Далее</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- DATA ----
const PARAMS = [
  { section: 'Тело' },
  { key: 'yoga',     label: 'Йога',                     emoji: 'Йога',    type: 'check' },
  { key: 'vitd',     label: 'Витамин D (ME)',            emoji: 'Витамин D', type: 'num', placeholder: '2000' },
  { key: 'chia',     label: 'Семена чиа',                emoji: 'Семена чиа', type: 'check' },

// FIX: Use local date, not UTC
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function isToday(d) { return dateKey(d) === dateKey(new Date()); }

function getWeekDates(offset) {
  const today = new Date(), dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow===0?6:dow-1) + offset*7);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
}

function getMonthDates(offset) {
  const today = new Date();
  const first = new Date(today.getFullYear(), today.getMonth() + offset, 1);
  const last = new Date(today.getFullYear(), today.getMonth() + offset + 1, 0);
  const days = [];
  for (let d = new Date(first); d <= last; d.setDate(d.getDate()+1)) {
    days.push(new Date(d));
  }
  return days;
}

function save() { try { localStorage.setItem('habitTrackerData', JSON.stringify(data)); } catch(e) {} }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function exportData() {
  if (!Object.keys(data).length) { showToast('Нет данных для экспорта'); return; }
  const blob = new Blob([JSON.stringify({exportedAt:new Date().toISOString(),version:1,data},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tracker-'+dateKey(new Date())+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Данные экспортированы');
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      data = Object.assign({}, data, parsed.data||parsed);
      save(); render(); showToast('Данные загружены');
    } catch { showToast('Ошибка: неверный формат'); }
  };
  reader.readAsText(file); event.target.value='';
}

function toggleCheck(key, dk) {
  if (!data[dk]) data[dk]={};
  const cur = data[dk][key];
  data[dk][key] = cur==='done'?'skip':cur==='skip'?null:'done';

function setVal(key, dk, val) {

const QUICK_PARAMS = PARAMS.filter(p => p.key && p.type !== 'awareness');
let quickIdx = 0;
let quickDk = '';
let quickAwarenessQ = '';


// Total steps = all params + 1 awareness step at the end
// quickIdx goes 0..QUICK_PARAMS.length-1 for params, then QUICK_PARAMS.length for awareness

function openQuick() {
  quickDk = dateKey(new Date());
  quickIdx = 0;
  quickAwarenessQ = AWARENESS_QUESTIONS[Math.floor(Math.random() * AWARENESS_QUESTIONS.length)];
  document.getElementById('modalOverlay').classList.remove('hidden');
  renderQuickStep();
}

function closeQuick() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function renderQuickStep() {
  const total = QUICK_PARAMS.length + 1; // +1 for awareness step
  const isAwareness = quickIdx === QUICK_PARAMS.length;

  document.getElementById('modalProgressFill').style.width = Math.round((quickIdx/total)*100)+'%';
  document.getElementById('modalStep').textContent = (quickIdx+1) + ' / ' + total;
  document.getElementById('modalNextBtn').textContent = isAwareness ? 'Готово' : 'Далее';

  // Always hide awareness block — we render it manually in modalInput
  document.getElementById('modalAwareness').classList.add('hidden');

  if (isAwareness) {
    document.getElementById('modalLabel').textContent = 'Вопрос на осознанность';
    const stored = data[quickDk] ? (data[quickDk]['awareness'] || '') : '';
    const parts = stored.split('\n---\n');
    const savedA = parts.length > 1 ? parts[1] : '';
    document.getElementById('modalInput').innerHTML =
      '<div style="background:rgba(92,122,94,0.08);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:20px">' +
        '<div style="font-size:14px;color:var(--text);line-height:1.6;font-style:italic">' + quickAwarenessQ + '</div>' +
      '</div>' +
      '<div class="modal-text-wrap">' +
        '<textarea class="modal-text-input" id="qtInput" placeholder="твой ответ...">' + savedA + '</textarea>' +
      '</div>';
  } else {
    const p = QUICK_PARAMS[quickIdx];
    const existing = data[quickDk] ? data[quickDk][p.key] : null;
    document.getElementById('modalLabel').textContent = p.label;
    let html = '';
    if (p.type === 'check') {
      const state = existing || '';
      const yesCls = state === 'done' ? 'selected-yes' : '';
      const skipCls = state === 'skip' ? 'selected-skip' : '';
      html = '<div class="modal-check-row">' +
        '<button class="modal-check-btn '+yesCls+'" id="qcYes" onclick="quickSetCheck(\'done\')">Да</button>' +
        '<button class="modal-check-btn '+skipCls+'" id="qcSkip" onclick="quickSetCheck(\'skip\')">Пропустить</button>' +
        '</div>';
    } else if (p.type === 'num') {
      const v = (existing !== null && existing !== undefined && existing !== '') ? existing : '';
      html = '<div class="modal-num-wrap">' +
        '<input class="modal-num-input" type="number" inputmode="decimal" id="qnInput" min="0" max="'+(p.max||99999)+'" step="'+(p.max===10?1:0.5)+'" value="'+v+'" placeholder="'+(p.placeholder||'')+'">' +
        '</div>';
    } else if (p.type === 'text') {
      const v = existing || '';
      html = '<div class="modal-text-wrap">' +
        '<textarea class="modal-text-input" id="qtInput" placeholder="заметки о дне...">'+v+'</textarea>' +
        '</div>';
    }
    document.getElementById('modalInput').innerHTML = html;
  }
}

function quickSetCheck(val) {
  const p = QUICK_PARAMS[quickIdx];
  if (!data[quickDk]) data[quickDk] = {};
  const cur = data[quickDk][p.key];
  data[quickDk][p.key] = cur === val ? null : val;
  save();
  renderQuickStep();
}

function quickSaveCurrentAndAdvance(goForward) {
  const isAwareness = quickIdx === QUICK_PARAMS.length;
  if (!data[quickDk]) data[quickDk] = {};

  if (isAwareness) {
    // Save awareness answer as "question\n---\nanswer" in awareness key
    const inp = document.getElementById('qtInput');
    if (inp) {
      const answer = inp.value.trim();
      if (answer) {
        data[quickDk]['awareness'] = quickAwarenessQ + '\n---\n' + answer;
      }
      save();
    }
    if (goForward) {
      closeQuick();
      render();
      showToast('День заполнен!');
    } else {
      quickIdx--;
      renderQuickStep();
    }
  } else {
    const p = QUICK_PARAMS[quickIdx];
    if (p.type === 'num') {
      const inp = document.getElementById('qnInput');
      if (inp && inp.value !== '') data[quickDk][p.key] = inp.value;
    } else if (p.type === 'text') {
      const inp = document.getElementById('qtInput');
      if (inp) data[quickDk][p.key] = inp.value;
    }
    save();
    if (goForward) {
      quickIdx++;
      renderQuickStep();
    } else {
      if (quickIdx > 0) { quickIdx--; renderQuickStep(); }
    }
  }
}

function quickNext() { quickSaveCurrentAndAdvance(true); }
function quickBack() { quickSaveCurrentAndAdvance(false); }

function getStats(days) {
  let s = {
    moodS:0,moodC:0,anxS:0,anxC:0,sleepS:0,sleepC:0,
    yoga:0,chia:0,outside:0,creative:0,sex:0,folic:0,
    totalNuts:0,totalVitD:0,totalSteps:0,stepsC:0,
    totalThesis:0,totalWater:0,waterC:0,totalConsult:0,
    moodByDay:[],anxByDay:[],sleepByDay:[]
  };
  days.forEach(d => {
    const r = data[dateKey(d)]||{};
    if (r.mood!==undefined&&r.mood!==''){s.moodS+=+r.mood;s.moodC++;s.moodByDay.push(+r.mood);}else{s.moodByDay.push(null);}
    if (r.anxiety!==undefined&&r.anxiety!==''){s.anxS+=+r.anxiety;s.anxC++;s.anxByDay.push(+r.anxiety);}else{s.anxByDay.push(null);}
    if (r.sleep!==undefined&&r.sleep!==''){s.sleepS+=+r.sleep;s.sleepC++;s.sleepByDay.push(+r.sleep);}else{s.sleepByDay.push(null);}
    if (r.yoga==='done') s.yoga++;
    if (r.chia==='done') s.chia++;
    if (r.outside==='done') s.outside++;
    if (r.creative==='done') s.creative++;
    if (r.sex==='done') s.sex++;
    if (r.folic==='done') s.folic++;
    if (r.nuts!==undefined&&r.nuts!=='') s.totalNuts+=parseFloat(r.nuts)||0;
    if (r.vitd!==undefined&&r.vitd!=='') s.totalVitD+=parseFloat(r.vitd)||0;
    if (r.steps!==undefined&&r.steps!==''){s.totalSteps+=parseFloat(r.steps)||0;s.stepsC++;}
    if (r.thesis!==undefined&&r.thesis!=='') s.totalThesis+=parseFloat(r.thesis)||0;
    if (r.water!==undefined&&r.water!==''){s.totalWater+=parseFloat(r.water)||0;s.waterC++;}
    if (r.consult!==undefined&&r.consult!=='') s.totalConsult+=parseFloat(r.consult)||0;
  });
  return s;
}

    document.getElementById('progressPeriodLabel').textContent =

  }

  // Mood chart — rounded bars, light labels, hover effect
  const labels = days.map(d => currentPeriod==='week' ? DAY_NAMES[d.getDay()] : d.getDate());
  const metrics = [
    { label:'Самочувствие', values:s.moodByDay, color:'#A3B18A' },

    { label:'Сон',          values:s.sleepByDay, color:'#A8BED8' },
  ];
  let chartHtml = '';
  metrics.forEach(m => {
    chartHtml += '<div style="margin-bottom:20px">';

    chartHtml += '<div style="display:flex;gap:3px;align-items:flex-end;height:48px;margin-bottom:5px">';

  const seNear = seTotal > SE_MAX_WEEK*0.7*(daysCount/7) && !seOver;
  const vitdGoal = VITD_WEEK_GOAL * (daysCount/7);
  const vitdPct = Math.min(Math.round(s.totalVitD/vitdGoal*100),150);
  const vitdDays = days.filter(d=>{const r=data[dateKey(d)]||{};return r.vitd!==undefined&&r.vitd!=='';}).length;
  const stepsAvg = s.stepsC ? Math.round(s.totalSteps/s.stepsC) : 0;
  const stepsPct = Math.min(Math.round(stepsAvg/STEPS_GOAL*100),150);
  const waterAvg = s.waterC ? (s.totalWater/s.waterC).toFixed(1) : 0;
  const waterPct = Math.min(Math.round(waterAvg/WATER_GOAL*100),150);

  document.getElementById('nutrientCards').innerHTML =
    '<div class="p-card'+(seOver?' warn':'')+'">'+
      '<div class="p-title">Селен</div>'+

      '<div class="p-sub">Норма: '+seNorm+' мкг · '+Math.round(s.totalNuts)+' орехов</div>'+
      '<div class="p-bar"><div class="p-fill'+(seOver||seNear?' warn':'')+'" style="width:'+Math.min(sePct,100)+'%"></div></div>'+
      '<div class="p-pct">'+sePct+'% от нормы</div>'+
      (seOver?'<div class="warn-text">Превышен безопасный предел</div>':'')+
    '</div>'+
    '<div class="p-card">'+
      '<div class="p-title">Витамин D</div>'+
      '<div class="p-nums"><span class="p-big">'+Math.round(s.totalVitD).toLocaleString('ru')+'</span><span class="p-unit">МЕ</span></div>'+
      '<div class="p-sub">Цель: '+Math.round(vitdGoal).toLocaleString('ru')+' МЕ · '+vitdDays+'/'+daysCount+' дней</div>'+
      '<div class="p-bar"><div class="p-fill blue" style="width:'+Math.min(vitdPct,100)+'%"></div></div>'+
      '<div class="p-pct">'+vitdPct+'% от цели</div>'+
    '</div>'+
    '<div class="p-card">'+
      '<div class="p-title">Шаги</div>'+
      '<div class="p-nums"><span class="p-big">'+(stepsAvg?stepsAvg.toLocaleString('ru'):'-')+'</span><span class="p-unit">в среднем</span></div>'+
      '<div class="p-sub">Цель: '+STEPS_GOAL.toLocaleString('ru')+'/день</div>'+
      '<div class="p-bar"><div class="p-fill" style="width:'+Math.min(stepsPct,100)+'%"></div></div>'+
      '<div class="p-pct">'+(stepsAvg?stepsPct+'% от цели':'Нет данных')+'</div>'+
    '</div>'+
    '<div class="p-card">'+
      '<div class="p-title">Вода</div>'+
      '<div class="p-nums"><span class="p-big">'+(waterAvg||'-')+'</span><span class="p-unit">ст/день</span></div>'+

      '<div class="p-bar"><div class="p-fill purple" style="width:'+Math.min(waterPct,100)+'%"></div></div>'+
      '<div class="p-pct">'+(s.waterC?waterPct+'% от цели':'Нет данных')+'</div>'+
    '</div>';

  const moodAvg = s.moodC ? (s.moodS/s.moodC).toFixed(1) : '-';
  const anxAvg  = s.anxC  ? (s.anxS/s.anxC).toFixed(1)   : '-';

  document.getElementById('habitsGrid').innerHTML =

function renderTracker(days) {
  const table = document.getElementById('trackerTable');

  days.forEach(d => {
    const tc = isToday(d)?' today-cell':'';

  });
  html += '</tr></thead><tbody>';

  PARAMS.forEach(p => {
    if (p.section) { html+='<tr class="section-divider"><td colspan="8">'+p.section+'</td></tr>'; return; }
    html += '<tr><td class="param-name">'+p.label+'</td>';
    days.forEach(d => {
      const dk = dateKey(d);
      const val = data[dk]?data[dk][p.key]:null;
      const tc = isToday(d)?' today-cell':'';
      html += '<td class="day-cell'+tc+'">';
      if (p.type==='check') {
        const state=val||'';
        const cls=state==='done'?'done':state==='skip'?'skip':'';
        const icon=state==='done'?'v':state==='skip'?'-':'.';
        html+='<button class="check-btn '+cls+'" onclick="toggleCheck(\''+p.key+'\',\''+dk+'\')">'+icon+'</button>';
      } else if (p.type==='num') {
        const v=(val!==null&&val!==undefined&&val!=='')?val:'';
        html+='<input class="num-input" type="number" inputmode="decimal" min="0" max="'+(p.max||99999)+'" step="'+(p.max===10?1:0.5)+'" value="'+v+'" placeholder="'+(p.placeholder||'')+'" onchange="setVal(\''+p.key+'\',\''+dk+'\',this.value)">';
      } else if (p.type==='text') {
        const v=(val||'').replace(/"/g,'&quot;').replace(/\n/g,'&#10;');
        html+='<textarea class="notes-input" onchange="setVal(\''+p.key+'\',\''+dk+'\',this.value)" placeholder="заметка...">'+v+'</textarea>';
      } else if (p.type==='awareness') {
        // Show question in italic + answer below
        const stored = val || '';
        const parts = stored.split('\n---\n');
        const q = parts[0] || '';
        const a = parts[1] || '';
        if (q) {
          html += '<div style="font-size:11px;color:var(--text3);font-style:italic;margin-bottom:3px;min-width:120px">'+q+'</div>';
          html += '<div style="font-size:12px;color:var(--text)">'+a+'</div>';
        } else {
          html += '<span style="color:var(--text3);font-size:12px">—</span>';
        }
      }
      html+='</td>';
    });
    html+='</tr>';
  });
  html+='</tbody>';
  table.innerHTML = html;
}

// ---- MAIN RENDER ----
function render() {
  const days = getWeekDates(weekOffset);
  const first=days[0], last=days[6];
  document.getElementById('weekLabel').textContent =
    first.getDate()+' '+MONTH_NAMES[first.getMonth()]+' - '+last.getDate()+' '+MONTH_NAMES[last.getMonth()]+' '+last.getFullYear();

  if (currentTab==='tracker') renderTracker(days);
  else renderProgress();
}

render();
</script>
</body>
