<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Трекер">
<title>Трекер привычек</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --accent: #5C7A5E;
    --text: #2C2A24;
    --text2: #7A7670;
    --text3: #A8A49E;
    --border: rgba(44,42,36,0.1);
    --border2: rgba(44,42,36,0.18);
    --done-bg: #5C7A5E;
    --done-text: #fff;
    --skip-bg: #F0EDE6;
    --skip-text: #A8A49E;
    --radius: 12px;
    --radius-sm: 8px;
    --warn: #B85A1A;
    --warn-bg: #FDF0E6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; padding-bottom: 60px; }

  /* HEADER */
  .app-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px 24px 0; position: sticky; top: 0; z-index: 10;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 16px;
  }
  .app-header h1 {
    font-family: 'Spectral', serif; font-size: 22px; font-weight: 400;
    color: var(--text); letter-spacing: 0.01em;
  }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; border-radius: var(--radius-sm);
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-export { background: #4A6FA5; color: white; }
  .btn-import { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }

  /* TABS */
  .tabs {
    display: flex; gap: 0; margin-top: 4px;
  }
  .tab-btn {
    flex: 1; padding: 11px 16px; border: none; background: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  /* WEEK NAV */
  .week-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 10px;
  }
  .nav-arrow {
    background: var(--surface2); border: none; border-radius: var(--radius-sm);
    width: 36px; height: 36px; cursor: pointer; font-size: 18px; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .nav-arrow:hover { background: var(--border2); }
  .week-label { font-size: 14px; color: var(--text2); flex: 1; text-align: center; }
  .btn-today {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); padding: 8px 16px;
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
  }
  .btn-today:hover { opacity: 0.85; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* TABLE VIEW */
  .table-scroll { overflow-x: auto; padding: 16px 24px 0; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 520px; }
  thead th {
    background: var(--surface); font-size: 11px; font-weight: 500; color: var(--text3);
    padding: 10px 10px 8px; text-align: center;
    border-bottom: 1px solid var(--border); letter-spacing: 0.04em; text-transform: uppercase;
  }
  thead th.param-col {
    text-align: left; min-width: 180px; padding-left: 14px;
    position: sticky; left: 0; z-index: 2; background: var(--surface);
  }
  tbody tr:nth-child(even) td { background: rgba(240,237,230,0.3); }
  tbody tr td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    vertical-align: middle; background: var(--surface); transition: background 0.1s;
  }
  tbody tr:hover td { background: rgba(240,237,230,0.5); }
  tbody tr:nth-child(even):hover td { background: rgba(240,237,230,0.7); }
  td.param-name {
    font-size: 13px; color: var(--text); padding-left: 14px; min-width: 180px;
    position: sticky; left: 0; z-index: 1; background: var(--surface);
    box-shadow: 2px 0 6px rgba(44,42,36,0.07);
  }
  td.day-cell { text-align: center; min-width: 62px; }
  td.today-cell { background: rgba(92,122,94,0.07) !important; }

  .check-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border2); background: none;
    cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: var(--text3);
  }
  .check-btn:hover { border-color: var(--accent); color: var(--accent); }
  .check-btn.done { background: var(--done-bg); border-color: var(--done-bg); color: var(--done-text); }
  .check-btn.skip { background: var(--skip-bg); border-color: transparent; color: var(--skip-text); }

  .num-input {
    width: 52px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 5px 4px; text-align: center; font-size: 13px;
    font-family: 'DM Sans', sans-serif; background: transparent; color: var(--text);
    transition: border-color 0.15s;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }
  .text-input {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 5px 8px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    background: transparent; color: var(--text); min-width: 90px;
    transition: border-color 0.15s;
  }
  .text-input:focus { outline: none; border-color: var(--accent); }

  .section-divider td:first-child { position: sticky; left: 0; z-index: 1; }
  .section-divider td {
    background: var(--bg) !important; padding: 8px 14px 3px;
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.06em; font-weight: 500; border-bottom: none;
  }

  /* PROGRESS VIEW */
  .progress-view { padding: 20px 24px; }
  .progress-view h2 {
    font-family: 'Spectral', serif; font-size: 18px; font-weight: 400;
    color: var(--text); margin-bottom: 6px;
  }
  .progress-week-label { font-size: 13px; color: var(--text3); margin-bottom: 20px; }

  .progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }

  .p-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .p-card.warn { border-color: rgba(184,90,26,0.35); background: var(--warn-bg); }
  .p-card.full { grid-column: 1 / -1; }

  .p-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .p-nums { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .p-big { font-size: 28px; font-weight: 500; color: var(--text); }
  .p-unit { font-size: 12px; color: var(--text3); }
  .p-sub { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .p-bar { background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 5px; }
  .p-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; background: var(--accent); }
  .p-fill.warn { background: var(--warn); }
  .p-fill.blue { background: #4A6FA5; }
  .p-fill.purple { background: #7A6FA5; }
  .p-pct { font-size: 11px; color: var(--text3); }
  .warn-text { font-size: 11px; color: var(--warn); margin-top: 8px; line-height: 1.4; }

  .mood-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .mood-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
  .mood-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .mood-bar-fill { height: 100%; border-radius: 4px; }
  .mood-val { font-size: 12px; font-weight: 500; color: var(--text); width: 28px; text-align: right; flex-shrink: 0; }

  .habits-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .habit-chip {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 12px; text-align: center;
  }
  .habit-chip-icon { font-size: 18px; margin-bottom: 4px; }
  .habit-chip-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
  .habit-chip-val { font-size: 16px; font-weight: 500; color: var(--text); }
  .habit-chip-sub { font-size: 10px; color: var(--text3); }

  .section-title {
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px; margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white; padding: 11px 22px;
    border-radius: 20px; font-size: 13px; z-index: 100;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  #importFile { display: none; }

  @media (max-width: 700px) {
    .progress-grid { grid-template-columns: 1fr; }
    .p-card.full { grid-column: 1; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .app-header, .week-bar, .progress-view { padding-left: 16px; padding-right: 16px; }
    .table-scroll { padding-left: 16px; padding-right: 16px; }
    .habits-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <h1>Трекер привычек</h1>
    <div class="header-actions">
      <button class="btn btn-export" onclick="exportData()">⬇ Экспорт</button>
      <button class="btn btn-import" onclick="document.getElementById('importFile').click()">⬆ Импорт</button>
      <input type="file" id="importFile" accept=".json" onchange="importData(event)">
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tracker', this)">📋 Трекер</button>
    <button class="tab-btn" onclick="switchTab('progress', this)">📊 Прогресс</button>
  </div>
</div>

<div class="week-bar">
  <button class="nav-arrow" onclick="shiftWeek(-1)">&#8592;</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="nav-arrow" onclick="shiftWeek(1)">&#8594;</button>
  <button class="btn-today" onclick="goToday()">Сегодня</button>
</div>

<!-- TRACKER VIEW -->
<div id="view-tracker" class="view active">
  <div class="table-scroll"><table id="trackerTable"></table></div>
</div>

<!-- PROGRESS VIEW -->
<div id="view-progress" class="view">
  <div class="progress-view">
    <h2>Прогресс недели</h2>
    <div class="progress-week-label" id="progressWeekLabel"></div>

    <div class="section-title">Состояние</div>
    <div class="p-card full" style="margin-bottom:12px">
      <div class="p-title">Динамика по дням</div>
      <div id="moodChart"></div>
    </div>

    <div class="section-title">Нутриенты</div>
    <div class="progress-grid" id="nutrientCards"></div>

    <div class="section-title" style="margin-top:8px">Привычки за неделю</div>
    <div class="p-card full" style="margin-bottom:0">
      <div class="habits-grid" id="habitsGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PARAMS = [
  { section: 'Тело' },
  { key: 'yoga',     label: 'Йога 🧘',                   type: 'check' },
  { key: 'vitd',     label: 'Витамин D 🌿 (МЕ)',         type: 'num', placeholder: '2000' },
  { key: 'chia',     label: 'Семена чиа 🌱',              type: 'check' },
  { key: 'nuts',     label: 'Орехи бразильские (шт)',     type: 'num', placeholder: '1' },
  { key: 'folic',    label: 'Фолиевая кислота',           type: 'check' },
  { key: 'water',    label: 'Вода 💧 (стаканы)',          type: 'num', placeholder: '8' },
  { key: 'steps',    label: 'Шаги 🚶',                   type: 'num', placeholder: '8000' },
  { key: 'outside',  label: 'Выход на улицу ☀️',         type: 'check' },
  { section: 'Состояние' },
  { key: 'mood',     label: 'Самочувствие (0–10)',        type: 'num', max: 10 },
  { key: 'anxiety',  label: 'Тревожность (0–10)',         type: 'num', max: 10 },
  { key: 'sleep',    label: 'Качество сна (0–10)',        type: 'num', max: 10 },
  { key: 'cycle',    label: 'День цикла 🌙',             type: 'num', placeholder: '1' },
  { section: 'Работа' },
  { key: 'consult',  label: 'Консультации (кол-во)',      type: 'num' },
  { key: 'thesis',   label: 'Диссертация 📖 (часы)',     type: 'num', placeholder: '0' },
  { section: 'Жизнь' },
  { key: 'creative', label: 'Творчество 🎨',              type: 'check' },
  { key: 'sex',      label: 'Секс 💜',                    type: 'check' },
  { section: 'Заметки' },
  { key: 'notes',    label: 'Обстоятельства / Примечания', type: 'text' },
];

const SE_PER_NUT = 70, SE_DAILY_NORM = 55, SE_MAX_WEEK = 400*7;
const VITD_DAILY_GOAL = 2000, VITD_WEEK_GOAL = 14000;
const STEPS_GOAL = 8000, WATER_GOAL = 8;
const DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAY_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTH_NAMES = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let weekOffset = 0, currentTab = 'tracker';
let data = {};
try { data = JSON.parse(localStorage.getItem('habitTrackerData') || '{}'); } catch(e) {}

function dateKey(d) { return d.toISOString().slice(0,10); }
function isToday(d) { return dateKey(d) === dateKey(new Date()); }

function getWeekDates(offset) {
  const today = new Date(), dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow===0?6:dow-1) + offset*7);
  return Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}

function save() { try { localStorage.setItem('habitTrackerData', JSON.stringify(data)); } catch(e) {} }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function exportData() {
  if (!Object.keys(data).length) { showToast('Нет данных для экспорта'); return; }
  const blob = new Blob([JSON.stringify({exportedAt:new Date().toISOString(),version:1,data},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Данные экспортированы ✓');
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      data = Object.assign({}, data, parsed.data||parsed);
      save(); render(); showToast('Данные загружены ✓');
    } catch { showToast('Ошибка: неверный формат'); }
  };
  reader.readAsText(file); event.target.value='';
}

function toggleCheck(key, dk) {
  if (!data[dk]) data[dk]={};
  const cur = data[dk][key];
  data[dk][key] = cur==='done'?'skip':cur==='skip'?null:'done';
  save(); render();
}

function setVal(key, dk, val) {
  if (!data[dk]) data[dk]={};
  data[dk][key]=val; save();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  render();
}

function shiftWeek(dir) { weekOffset+=dir; render(); }
function goToday() { weekOffset=0; render(); }

function getWeekStats(days) {
  let s = { moodS:0,moodC:0,anxS:0,anxC:0,sleepS:0,sleepC:0,yoga:0,chia:0,outside:0,creative:0,sex:0,folic:0,
             totalNuts:0,totalVitD:0,totalSteps:0,stepsC:0,totalThesis:0,totalWater:0,waterC:0,totalConsult:0,
             moodByDay:[], anxByDay:[], sleepByDay:[] };
  days.forEach(d => {
    const r = data[dateKey(d)]||{};
    if (r.mood!==undefined&&r.mood!==''){s.moodS+=+r.mood;s.moodC++;s.moodByDay.push(+r.mood);}else{s.moodByDay.push(null);}
    if (r.anxiety!==undefined&&r.anxiety!==''){s.anxS+=+r.anxiety;s.anxC++;s.anxByDay.push(+r.anxiety);}else{s.anxByDay.push(null);}
    if (r.sleep!==undefined&&r.sleep!==''){s.sleepS+=+r.sleep;s.sleepC++;s.sleepByDay.push(+r.sleep);}else{s.sleepByDay.push(null);}
    if (r.yoga==='done') s.yoga++;
    if (r.chia==='done') s.chia++;
    if (r.outside==='done') s.outside++;
    if (r.creative==='done') s.creative++;
    if (r.sex==='done') s.sex++;
    if (r.folic==='done') s.folic++;
    if (r.nuts!==undefined&&r.nuts!=='') s.totalNuts+=parseFloat(r.nuts)||0;
    if (r.vitd!==undefined&&r.vitd!=='') s.totalVitD+=parseFloat(r.vitd)||0;
    if (r.steps!==undefined&&r.steps!==''){s.totalSteps+=parseFloat(r.steps)||0;s.stepsC++;}
    if (r.thesis!==undefined&&r.thesis!=='') s.totalThesis+=parseFloat(r.thesis)||0;
    if (r.water!==undefined&&r.water!==''){s.totalWater+=parseFloat(r.water)||0;s.waterC++;}
    if (r.consult!==undefined&&r.consult!=='') s.totalConsult+=parseFloat(r.consult)||0;
  });
  return s;
}

function renderMoodChart(days, s) {
  const labels = days.map(d => DAY_SHORT[d.getDay()]);
  const metrics = [
    { label: 'Самочувствие', values: s.moodByDay, color: '#5C7A5E' },
    { label: 'Тревожность',  values: s.anxByDay,  color: '#B85A1A' },
    { label: 'Сон',          values: s.sleepByDay, color: '#4A6FA5' },
  ];

  let html = '';
  metrics.forEach(m => {
    html += `<div class="mood-row" style="margin-bottom:14px">
      <div class="mood-label" style="font-size:12px;color:var(--text2);width:100px;flex-shrink:0">${m.label}</div>
      <div style="flex:1">
        <div style="display:flex;gap:4px;align-items:flex-end;height:40px;margin-bottom:4px">`;
    m.values.forEach((v, i) => {
      const h = v !== null ? Math.round((v/10)*40) : 0;
      const op = v !== null ? 1 : 0.15;
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="font-size:9px;color:var(--text3)">${v!==null?v:''}</div>
        <div style="width:100%;height:${h}px;background:${m.color};opacity:${op};border-radius:3px 3px 0 0;min-height:2px"></div>
      </div>`;
    });
    html += `</div>
        <div style="display:flex;gap:4px">`;
    labels.forEach(l => {
      html += `<div style="flex:1;text-align:center;font-size:9px;color:var(--text3)">${l}</div>`;
    });
    html += `</div></div></div>`;
  });

  // Legend
  html += `<div style="display:flex;gap:14px;margin-top:4px">`;
  metrics.forEach(m => {
    html += `<div style="display:flex;align-items:center;gap:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${m.color}"></div>
      <span style="font-size:11px;color:var(--text3)">${m.label}</span>
    </div>`;
  });
  html += '</div>';

  document.getElementById('moodChart').innerHTML = html;
}

function renderProgress(days) {
  const s = getWeekStats(days);
  const first=days[0], last=days[6];
  document.getElementById('progressWeekLabel').textContent =
    `${first.getDate()} ${MONTH_NAMES[first.getMonth()]} — ${last.getDate()} ${MONTH_NAMES[last.getMonth()]} ${last.getFullYear()}`;

  renderMoodChart(days, s);

  // Nutrient cards
  const seTotal = Math.round(s.totalNuts * SE_PER_NUT);
  const seWeekNorm = SE_DAILY_NORM * 7;
  const sePct = Math.min(Math.round(seTotal/seWeekNorm*100),200);
  const seOver = seTotal > SE_MAX_WEEK;
  const seNear = seTotal > SE_MAX_WEEK*0.7 && !seOver;
  const vitdPct = Math.min(Math.round(s.totalVitD/VITD_WEEK_GOAL*100),150);
  const vitdDays = days.filter(d=>{const r=data[dateKey(d)]||{};return r.vitd!==undefined&&r.vitd!=='';}).length;
  const stepsAvg = s.stepsC ? Math.round(s.totalSteps/s.stepsC) : 0;
  const stepsPct = Math.min(Math.round(stepsAvg/STEPS_GOAL*100),150);
  const waterAvg = s.waterC ? (s.totalWater/s.waterC).toFixed(1) : 0;
  const waterPct = Math.min(Math.round(waterAvg/WATER_GOAL*100),150);

  document.getElementById('nutrientCards').innerHTML = `
    <div class="p-card${seOver?' warn':''}">
      <div class="p-title">Селен</div>
      <div class="p-nums"><span class="p-big">${seTotal}</span><span class="p-unit">мкг</span></div>
      <div class="p-sub">Норма: ${seWeekNorm} мкг/нед · ${Math.round(s.totalNuts)} орехов</div>
      <div class="p-bar"><div class="p-fill${seOver||seNear?' warn':''}" style="width:${Math.min(sePct,100)}%"></div></div>
      <div class="p-pct">${sePct}% от нормы</div>
      ${seOver?'<div class="warn-text">⚠️ Превышен безопасный предел</div>':''}
    </div>
    <div class="p-card">
      <div class="p-title">Витамин D</div>
      <div class="p-nums"><span class="p-big">${Math.round(s.totalVitD).toLocaleString('ru')}</span><span class="p-unit">МЕ</span></div>
      <div class="p-sub">Цель: ${VITD_WEEK_GOAL.toLocaleString('ru')} МЕ/нед · ${vitdDays}/7 дней</div>
      <div class="p-bar"><div class="p-fill blue" style="width:${Math.min(vitdPct,100)}%"></div></div>
      <div class="p-pct">${vitdPct}% от цели</div>
    </div>
    <div class="p-card">
      <div class="p-title">Шаги</div>
      <div class="p-nums"><span class="p-big">${stepsAvg?stepsAvg.toLocaleString('ru'):'-'}</span><span class="p-unit">в среднем</span></div>
      <div class="p-sub">Цель: ${STEPS_GOAL.toLocaleString('ru')}/день · Всего: ${s.totalSteps?s.totalSteps.toLocaleString('ru'):'-'}</div>
      <div class="p-bar"><div class="p-fill" style="width:${Math.min(stepsPct,100)}%"></div></div>
      <div class="p-pct">${stepsAvg?stepsPct+'% от цели':'Нет данных'}</div>
    </div>
    <div class="p-card">
      <div class="p-title">Вода</div>
      <div class="p-nums"><span class="p-big">${waterAvg||'-'}</span><span class="p-unit">ст/день</span></div>
      <div class="p-sub">Цель: ${WATER_GOAL} стаканов в день</div>
      <div class="p-bar"><div class="p-fill purple" style="width:${Math.min(waterPct,100)}%"></div></div>
      <div class="p-pct">${s.waterC?waterPct+'% от цели':'Нет данных'}</div>
    </div>
  `;

  // Habits
  const moodAvg = s.moodC ? (s.moodS/s.moodC).toFixed(1) : '-';
  const anxAvg  = s.anxC  ? (s.anxS/s.anxC).toFixed(1)   : '-';
  const sleepAvg= s.sleepC? (s.sleepS/s.sleepC).toFixed(1): '-';

  document.getElementById('habitsGrid').innerHTML = `
    <div class="habit-chip"><div class="habit-chip-icon">🧘</div><div class="habit-chip-label">Йога</div><div class="habit-chip-val">${s.yoga}/7</div><div class="habit-chip-sub">дней</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">😌</div><div class="habit-chip-label">Самочувствие</div><div class="habit-chip-val">${moodAvg}</div><div class="habit-chip-sub">среднее</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">😰</div><div class="habit-chip-label">Тревожность</div><div class="habit-chip-val">${anxAvg}</div><div class="habit-chip-sub">среднее</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">😴</div><div class="habit-chip-label">Сон</div><div class="habit-chip-val">${sleepAvg}</div><div class="habit-chip-sub">среднее</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">📖</div><div class="habit-chip-label">Диссертация</div><div class="habit-chip-val">${s.totalThesis||'-'}</div><div class="habit-chip-sub">часов</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">🩺</div><div class="habit-chip-label">Консультации</div><div class="habit-chip-val">${s.totalConsult||'-'}</div><div class="habit-chip-sub">всего</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">☀️</div><div class="habit-chip-label">На улице</div><div class="habit-chip-val">${s.outside}/7</div><div class="habit-chip-sub">дней</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">🎨</div><div class="habit-chip-label">Творчество</div><div class="habit-chip-val">${s.creative}/7</div><div class="habit-chip-sub">дней</div></div>
    <div class="habit-chip"><div class="habit-chip-icon">💊</div><div class="habit-chip-label">Фолиевая</div><div class="habit-chip-val">${s.folic}/7</div><div class="habit-chip-sub">дней</div></div>
  `;
}

function renderTracker(days) {
  const table = document.getElementById('trackerTable');
  let html = '<thead><tr><th class="param-col">Параметр</th>';
  days.forEach(d => {
    const tc = isToday(d)?' today-cell':'';
    const bold = isToday(d)?'font-weight:600;color:#5C7A5E;':'';
    html += `<th class="${tc}" style="${bold}">${DAY_NAMES[d.getDay()]}<br><span style="font-size:12px;font-weight:400">${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  PARAMS.forEach(p => {
    if (p.section) { html+=`<tr class="section-divider"><td colspan="8">${p.section}</td></tr>`; return; }
    html += `<tr><td class="param-name">${p.label}</td>`;
    days.forEach(d => {
      const dk = dateKey(d);
      const val = data[dk]?data[dk][p.key]:null;
      const tc = isToday(d)?' today-cell':'';
      html += `<td class="day-cell${tc}">`;
      if (p.type==='check') {
        const state=val||'';
        const cls=state==='done'?'done':state==='skip'?'skip':'';
        const icon=state==='done'?'v':state==='skip'?'-':'.';
        html+=`<button class="check-btn ${cls}" onclick="toggleCheck('${p.key}','${dk}')">${icon}</button>`;
      } else if (p.type==='num') {
        const v=(val!==null&&val!==undefined&&val!=='')?val:'';
        html+=`<input class="num-input" type="number" min="0" max="${p.max||99999}" step="${p.max===10?1:0.5}" value="${v}" placeholder="${p.placeholder||'-'}" onchange="setVal('${p.key}','${dk}',this.value)">`;
      } else if (p.type==='text') {
        const v=(val||'').replace(/"/g,'&quot;');
        html+=`<input class="text-input" type="text" value="${v}" placeholder="заметка..." onchange="setVal('${p.key}','${dk}',this.value)">`;
      }
      html+='</td>';
    });
    html+='</tr>';
  });
  html+='</tbody>';
  table.innerHTML = html;
}

function render() {
  const days = getWeekDates(weekOffset);
  const first=days[0], last=days[6];
  document.getElementById('weekLabel').textContent =
    `${first.getDate()} ${MONTH_NAMES[first.getMonth()]} — ${last.getDate()} ${MONTH_NAMES[last.getMonth()]} ${last.getFullYear()}`;

  if (currentTab==='tracker') renderTracker(days);
  else renderProgress(days);
}

render();
</script>
</body>
</html>
